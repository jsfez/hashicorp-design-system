name: CI - MCP

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  NODE_VERSION: "24.x"

concurrency:
  group: ci-mcp-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  conditional-skip:
    runs-on: ubuntu-latest
    name: Get files changed and conditionally skip CI
    outputs:
      trigger-ci: ${{ steps.read-files.outputs.trigger-ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Get changed files
        id: read-files
        run: ./.github/scripts/filter_changed_files.sh "packages/mcp" "packages/flight-icons/catalog.json" "website/docs" "website/lib/markdown" ".github/workflows/ci-mcp.yml"

  test:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    needs: [conditional-skip]
    if: needs.conditional-skip.outputs.trigger-ci == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Verify MCP documentation catalog
        run: pnpm catalog:docs:build && git diff --exit-code -- src/catalogs/docs/catalog.json
        working-directory: packages/mcp
      - name: Typecheck MCP
        run: pnpm typecheck
        working-directory: packages/mcp
      - name: Lint MCP
        run: pnpm lint
        working-directory: packages/mcp
      - name: Test MCP
        run: pnpm test
        working-directory: packages/mcp
