name: CI - Argos

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  NODE_VERSION: "24.x"

concurrency:
  group: ci-argos-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  argos:
    name: "Visual tests"
    runs-on: ubuntu-latest
    permissions:
      # Argos authenticates the build with a short-lived OpenID Connect token,
      # so the workflow needs no secret of its own.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Argos reads the commit history to find the build to compare against.
          fetch-depth: 0
      - name: Install PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: argos
      - name: Build Showcase
        run: pnpm build
        working-directory: showcase
        env:
          BROWSERSLIST_IGNORE_OLD_DATA: 1
      - name: Run Argos
        run: pnpm test:argos
        working-directory: argos
